<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-overlay" aria-hidden="true"></div>

    <main id="app-shell">
        <section id="dashboard" class="hidden" aria-label="Search and shortcuts">
            <div id="search-section" class="dashboard-block hidden">
                <form id="search-form" class="search-form" role="search">
                    <input type="search" id="search-input" class="search-input" placeholder="Search the web" autocomplete="off" aria-label="Search">
                </form>
            </div>
            <div id="bookmarks-section" class="dashboard-block hidden">
                <div id="bookmarks-row-1" class="bookmarks-row"></div>
                <div id="bookmarks-row-2" class="bookmarks-row hidden"></div>
            </div>
        </section>

        <section id="quote-container">
            <div id="clock-container" class="hidden">
                <p id="clock-time"></p>
                <p id="clock-date"></p>
            </div>
            <p id="greeting" class="hidden"></p>
            <p id="quote"></p>
            <p id="author"></p>
            <div id="quote-actions">
                <button type="button" id="copy-btn" title="Copy quote" aria-label="Copy quote">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
                <button type="button" id="fav-btn" title="Save to favorites" aria-label="Save to favorites">
                    <svg id="fav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </button>
            </div>
        </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>

    <div id="bookmark-modal" class="bookmark-modal hidden" role="dialog" aria-modal="true" aria-labelledby="bookmark-modal-heading">
        <div class="bookmark-modal-backdrop" id="bookmark-modal-backdrop"></div>
        <div class="bookmark-modal-card">
            <h4 id="bookmark-modal-heading">Add bookmark</h4>
            <input type="text" id="bookmark-modal-name" class="bookmark-modal-input" placeholder="Name" maxlength="32">
            <input type="url" id="bookmark-modal-url" class="bookmark-modal-input" placeholder="https://..." maxlength="2048">
            <div class="bookmark-modal-actions">
                <button type="button" id="bookmark-modal-delete" class="bookmark-modal-delete hidden">Delete</button>
                <button type="button" id="bookmark-modal-cancel" class="bookmark-modal-cancel">Cancel</button>
                <button type="button" id="bookmark-modal-save" class="bookmark-modal-save">Save</button>
            </div>
        </div>
    </div>

    <div id="favorites-modal" class="favorites-modal hidden" role="dialog" aria-modal="true" aria-labelledby="favorites-modal-heading">
        <div class="favorites-modal-backdrop" id="favorites-modal-backdrop"></div>
        <div class="favorites-modal-card">
            <div class="favorites-modal-header">
                <h4 id="favorites-modal-heading">Favorite Quotes</h4>
                <button type="button" id="favorites-modal-close" class="favorites-modal-close" aria-label="Close">&times;</button>
            </div>
            <div id="favorites-modal-list" class="favorites-modal-list"></div>
        </div>
    </div>

    <div id="history-modal" class="favorites-modal hidden" role="dialog" aria-modal="true" aria-labelledby="history-modal-heading">
        <div class="favorites-modal-backdrop" id="history-modal-backdrop"></div>
        <div class="favorites-modal-card">
            <div class="favorites-modal-header">
                <h4 id="history-modal-heading">Previously Seen</h4>
                <button type="button" id="history-modal-close" class="favorites-modal-close" aria-label="Close">&times;</button>
            </div>
            <div id="history-modal-list" class="favorites-modal-list"></div>
        </div>
    </div>

    <div id="confirm-modal" class="confirm-modal hidden" role="alertdialog" aria-modal="true" aria-labelledby="confirm-modal-heading">
        <div class="confirm-modal-backdrop" id="confirm-modal-backdrop"></div>
        <div class="confirm-modal-card">
            <h4 id="confirm-modal-heading">Reset to defaults?</h4>
            <p class="confirm-modal-body">Your bookmarks, appearance preferences, and all customizations will be lost. Favorites will be kept.</p>
            <div class="confirm-modal-actions">
                <button type="button" id="confirm-modal-cancel" class="bookmark-modal-cancel">Cancel</button>
                <button type="button" id="confirm-modal-confirm" class="confirm-modal-confirm">Reset</button>
            </div>
        </div>
    </div>

    <div id="settings-panel">
        <section class="settings-section">
            <h3 class="settings-heading">Layout</h3>
            <label class="settings-row">
                Quote position
                <select id="quote-position-select">
                    <option value="center">Center</option>
                    <option value="top">Top</option>
                    <option value="bottom">Bottom</option>
                </select>
            </label>
            <label class="settings-row settings-check">
                <input type="checkbox" id="clock-enabled-check" checked>
                Show clock
            </label>
            <label class="settings-row" id="clock-format-row">
                Clock format
                <select id="clock-format-select">
                    <option value="12h">12-hour</option>
                    <option value="24h">24-hour</option>
                </select>
            </label>
            <label class="settings-row settings-check">
                <input type="checkbox" id="greeting-enabled-check" checked>
                Show greeting
            </label>

        </section>

        <section class="settings-section">
            <h3 class="settings-heading">Dashboard</h3>
            <label class="settings-row settings-check">
                <input type="checkbox" id="search-enabled-check">
                Show search bar
            </label>
            <label class="settings-row settings-check">
                <input type="checkbox" id="bookmarks-enabled-check">
                Show bookmarks
            </label>
            <div id="dashboard-options">
                <label class="settings-row">
                    Theme
                    <select id="dashboard-theme-select">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </label>
                <label class="settings-row">
                    Bookmark rows
                    <select id="bookmark-rows-select">
                        <option value="1">1 row</option>
                        <option value="2">2 rows</option>
                    </select>
                </label>
                <label class="settings-row">
                    Search engine
                    <select id="search-engine-select">
                        <option value="google">Google</option>
                        <option value="duckduckgo">DuckDuckGo</option>
                        <option value="bing">Bing</option>
                    </select>
                </label>
            </div>
        </section>

        <section class="settings-section">
            <h3 class="settings-heading">Text</h3>
            <label class="settings-row">
                Size
                <select id="font-size-select">
                    <option value="small">Small</option>
                    <option value="medium" selected>Medium</option>
                    <option value="large">Large</option>
                </select>
            </label>
            <label class="settings-row">
                Style
                <select id="font-family-select">
                    <option value="sans">Sans</option>
                    <option value="serif">Serif</option>
                    <option value="mono">Mono</option>
                    <option value="cursive">Cursive</option>
                    <option value="system">System</option>
                </select>
            </label>
            <label class="settings-row settings-check">
                <input type="checkbox" id="font-italic-check" checked>
                Italic quote
            </label>
            <label class="settings-row">
                Color
                <input type="color" id="text-picker" value="#ffffff">
            </label>
        </section>

        <section class="settings-section">
            <h3 class="settings-heading">Background</h3>
            <label class="settings-row">
                Solid color
                <input type="color" id="bg-picker" value="#000000">
            </label>
            <p class="settings-hint">Or pick a preset:</p>
            <div id="bg-preset-grid" class="bg-preset-grid"></div>
            <p class="settings-hint">Or use your own:</p>
            <div class="custom-upload-row">
                <button type="button" id="bg-custom-btn" class="custom-upload-btn">Upload image</button>
                <button type="button" id="bg-custom-remove" class="custom-upload-remove hidden">Remove</button>
            </div>
            <input type="file" id="bg-custom-input" accept="image/*" class="hidden">
        </section>

        <div style="display:flex; gap:8px; margin-bottom: 8px;">
            <button type="button" id="view-favorites-btn" class="view-favorites-btn" style="margin:0;">Favorites <span id="favorites-count"></span></button>
            <button type="button" id="view-history-btn" class="view-favorites-btn" style="margin:0;">History</button>
        </div>

        <div style="display:flex; gap:8px; margin-bottom: 8px;">
            <button type="button" id="export-data-btn" class="view-favorites-btn" style="margin:0;">Export Backup</button>
            <button type="button" id="import-data-btn" class="view-favorites-btn" style="margin:0;">Import Backup</button>
            <input type="file" id="import-data-input" accept=".json" class="hidden">
        </div>

        <button type="button" id="reset-settings-btn" class="reset-btn">Reset to defaults</button>
        <div style="display:flex; flex-direction:column; align-items:center; margin-top: 8px; border-top: 1px solid #444; padding-top: 12px;">
            <a href="https://zenquotes.io/" target="_blank" rel="noopener noreferrer" style="color: #888; font-size: 0.7rem; text-decoration: none;">Quotes provided by ZenQuotes API</a>
        </div>
    </div>

    <button type="button" id="edit-btn" title="Customize appearance">✎</button>

    <script src="bundled-quotes.js"></script>
    <script src="script.js"></script>
</body>
</html>
